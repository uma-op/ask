<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">

    <title>Ask me</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">
            <img src="{% static 'img/logo2.png' %}" width="50" height="50">
          </a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse w-50" id="navbarSupportedContent">
            <form class="d-flex w-50 position-absolute top-50 start-50 translate-middle" role="search">
              <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
              <button class="btn btn-outline-success" type="submit">Search</button>
            </form>
            <div class="navbar-nav position-absolute end-0">
              <a class="nav-link link-primary" href="#">log in</a>
              <a class="nav-link link-primary" href="#">register</a>
            </div>
          </div>
        </div>
      </nav>

      {% load static %}
      <script src="{% static 'js/bootstrap.bundle.js' %}"></script>
  </body>
</html>
