{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="{% static 'css/bootstrap.css' %}">

    <title>Ask me twice</title>
  </head>
  <body>
    <header class="border-bottom mt-3">
      <div class="container-fluid mb-3">
        <div class="row">
          <a href="/" class="col-3 d-flex align-items-center text-dark text-decoration-none">
            <img src="{% static 'img/logo2.png' %}" alt="AskMeTwice" width="50" height="50">
            <span class="fs-4">AskMeTwice</span>
          </a>

          <form class="d-flex align-items-center col-6">
            <input type="search" class="form-control" placeholder="Search..." aria-label="Search">
          </form>

          {% block authorized %}
            <a class="col-1" href="#">sign in</a>
            <a class="col-1" href="#">sign up</a>
          {% endblock %}
          </div>
        </div>
      </div>
    </header>

    <div class="container-fluid m-4">
      <div class="row d-flex justify-content">
        <div class="col-6">
          {% block content %}
          {% endblock %}
        </div>
        <div class="col-2"></div>
        <div class="col-4 container">
          <div class="row mb-4">
            <div class="col">
              <h1 class="mb-4">Popular Tags</h1>
              <a href="#">#abc</a>
              <a href="#">#def</a>
            </div>
          </div>
          <div class="row mb-4">
            <div class="col">
              <h1 class="mb-4">Best members</h1>
              <div class="d-flex flex-column">
                <a href="#">Joe mama</a>
                <a href="#">Joe mama</a>
                <a href="#">Joe mama</a>
                <a href="#">Joe mama</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

      <script src="{% static 'js/bootstrap.js' %}"></script>
      <script src="{% static 'js/bootstrap.bundle.js' %}"></script>
  </body>
</html>
